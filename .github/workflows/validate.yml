name: Validate Skills

on:
  push:
    branches: [main]
    paths: ['skills/**']
  pull_request:
    paths: ['skills/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find skills
        id: find
        run: |
          SKILLS=$(find skills -maxdepth 1 -mindepth 1 -type d | sort)
          if [ -z "$SKILLS" ]; then
            echo "No skills found"
            exit 0
          fi
          COUNT=$(echo "$SKILLS" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "skills<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SKILLS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check SKILL.md exists
        run: |
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            if [ ! -f "$skill/SKILL.md" ]; then
              echo "::error::$name: missing SKILL.md"
              exit 1
            fi
            echo "✅ $name: SKILL.md found"
          done <<< "${{ steps.find.outputs.skills }}"

      - name: Validate SKILL.md frontmatter
        run: |
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            skill_file="$skill/SKILL.md"

            if ! head -1 "$skill_file" | grep -q '^---'; then
              echo "::error::$name: SKILL.md must start with YAML frontmatter (---)"
              exit 1
            fi

            # Extract frontmatter (between first two --- lines)
            fm=$(awk '/^---/{n++; next} n==1' "$skill_file")
            if [ -z "$fm" ]; then
              echo "::error::$name: SKILL.md frontmatter is empty"
              exit 1
            fi

            if ! echo "$fm" | grep -q '^name:'; then
              echo "::error::$name: frontmatter missing 'name' field"
              exit 1
            fi

            if ! echo "$fm" | grep -q '^description:'; then
              echo "::error::$name: frontmatter missing 'description' field"
              exit 1
            fi

            skill_name=$(echo "$fm" | grep '^name:' | sed 's/name: *//' | tr -d '"' | tr -d "'")
            if ! echo "$skill_name" | grep -qE '^[a-z0-9][a-z0-9-]*[a-z0-9]$|^[a-z0-9]$'; then
              echo "::error::$name: name '$skill_name' must be lowercase, hyphens only"
              exit 1
            fi

            if [ "$skill_name" != "$name" ]; then
              echo "::error::$name: name '$skill_name' must match directory name '$name'"
              exit 1
            fi

            lines=$(wc -l < "$skill_file" | tr -d ' ')
            if [ "$lines" -gt 500 ]; then
              echo "::warning::$name: SKILL.md is $lines lines (max 500)"
            fi

            echo "✅ $name: frontmatter valid ($lines lines)"
          done <<< "${{ steps.find.outputs.skills }}"

      - name: Check for symlinks
        run: |
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            symlinks=$(find "$skill" -type l)
            if [ -n "$symlinks" ]; then
              echo "::error::$name: contains symlinks"
              echo "$symlinks"
              exit 1
            fi
            echo "✅ $name: no symlinks"
          done <<< "${{ steps.find.outputs.skills }}"

      - name: Check scripts are executable
        run: |
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            if [ -d "$skill/scripts" ]; then
              for script in "$skill/scripts"/*; do
                [ -f "$script" ] || continue
                if file "$script" | grep -q "script" && [ ! -x "$script" ]; then
                  echo "::warning::$name: $(basename "$script") not executable"
                fi
              done
            fi
          done <<< "${{ steps.find.outputs.skills }}"
          echo "✅ Script permissions checked"

      - name: Check structure
        run: |
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            extra=$(ls "$skill" | grep -v -E '^(SKILL\.md|scripts|references|assets|package\.json)$')
            if [ -n "$extra" ]; then
              echo "::warning::$name: unexpected files: $extra"
            fi
          done <<< "${{ steps.find.outputs.skills }}"
          echo "✅ Structure check complete"

      - name: Summary
        run: |
          echo "## Skill Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.find.outputs.count }}** skills validated" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r skill; do
            [ -z "$skill" ] && continue
            name=$(basename "$skill")
            echo "- ✅ \`$name\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.find.outputs.skills }}"
